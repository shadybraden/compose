services:
  immich_kiosk:
    image: ghcr.io/damongolding/immich-kiosk:0.39.3
    container_name: immich_kiosk
    user: 1000:1000
    environment:
      LANG: "en_US"
      TZ: America/New_York
      KIOSK_IMMICH_API_KEY: "${immich_api_key}"
      KIOSK_IMMICH_URL: "https://immich.${DOMAIN}"
      KIOSK_ALBUMS: "${KIOSK_ALBUMS}"
      KIOSK_SHOW_TIME: true
      KIOSK_TIME_FORMAT: 12
      KIOSK_SHOW_DATE: true
      KIOSK_DATE_FORMAT: DD/MM/YY
      KIOSK_CLOCK_SOURCE: client
      KIOSK_DURATION: 30
      KIOSK_SHOW_PROGRESS_BAR: true
      KIOSK_SHOW_USER: true
      KIOSK_SHOW_VIDEOS: true
      KIOSK_LIVE_PHOTOS: true
      KIOSK_SHOW_ANIMATED_GIFS: true
      KIOSK_SHOW_OWNER: false
      KIOSK_SHOW_IMAGE_TIME: true
      KIOSK_IMAGE_TIME_FORMAT: 12
      KIOSK_SHOW_IMAGE_DATE: true
      KIOSK_IMAGE_DATE_FORMAT: DD-MM-YYYY
      KIOSK_SHOW_IMAGE_LOCATION: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/kiosk", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true  # helps to increase security
    networks:
      - intranet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.immich_kiosk.entrypoints=http"
      - "traefik.http.routers.immich_kiosk.rule=Host(`immich_kiosk.${DOMAIN}`)"
      - "traefik.http.middlewares.immich_kiosk-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.immich_kiosk.middlewares=immich_kiosk-https-redirect"
      - "traefik.http.routers.immich_kiosk-secure.entrypoints=https"
      - "traefik.http.routers.immich_kiosk-secure.rule=Host(`immich_kiosk.${DOMAIN}`)"
      - "traefik.http.routers.immich_kiosk-secure.tls=true"
      - "traefik.http.routers.immich_kiosk-secure.service=immich_kiosk"
      - "traefik.http.services.immich_kiosk.loadbalancer.server.port=3000"  # port of the service.
      - "traefik.docker.network=intranet"
      - "homepage.group=Other"
      - "homepage.name=immich_kiosk"
      - "homepage.icon=/images/immich_kiosk.png"
      - "homepage.href=https://immich_kiosk.${DOMAIN}/"

networks:
  intranet:
    external: true
