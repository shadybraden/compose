---
services:
  clickhouse:
    container_name: clickhouse
    image: clickhouse/clickhouse-server:25.4.2
    volumes:
      - /data/config_storage/rybbit/clickhouse-data:/var/lib/clickhouse
    configs:
      - source: clickhouse_network
        target: /etc/clickhouse-server/config.d/network.xml
      - source: clickhouse_json
        target: /etc/clickhouse-server/config.d/enable_json.xml
      - source: clickhouse_logging
        target: /etc/clickhouse-server/config.d/logging_rules.xml
      - source: clickhouse_user_logging
        target: /etc/clickhouse-server/config.d/user_logging.xml
    environment:
      - CLICKHOUSE_DB=analytics
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    ports:
      - 8124:8123
    security_opt:
      - no-new-privileges:true  # helps to increase security
    networks:
      - intranet

  postgres:
    image: postgres:17.4
    container_name: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=analytics
    volumes:
      - /data/config_storage/rybbit/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d analytics"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
#    ports:
#      - 5432:5432
    security_opt:
      - no-new-privileges:true  # helps to increase security
    networks:
      - intranet

  backend:
    image: ghcr.io/rybbit-io/rybbit-backend:${IMAGE_TAG:-latest}
    container_name: backend
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - 3001:3001
    environment:
      - NODE_ENV=production
      - CLICKHOUSE_HOST=http://clickhouse:8123
      - CLICKHOUSE_DB=analytics
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=analytics
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BASE_URL=https://rybbit.${DOMAIN}
      - DISABLE_SIGNUP=false
      - DISABLE_TELEMETRY=true
      - MAPBOX_TOKEN=${MAPBOX_TOKEN}
      - USE_WEBSERVER=false
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true  # helps to increase security
    networks:
      - intranet

  client:
    image: ghcr.io/rybbit-io/rybbit-client:v2.4.0
    container_name: client
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: https://rybbit.${DOMAIN}
        NEXT_PUBLIC_DISABLE_SIGNUP: false
    ports:
      - 3002:3002
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND_URL=https://rybbit.${DOMAIN}
      - NEXT_PUBLIC_DISABLE_SIGNUP=false
      - USE_WEBSERVER=false
    depends_on:
      - backend
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true  # helps to increase security
    networks:
      - intranet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rybbit.entrypoints=http"
      - "traefik.http.routers.rybbit.rule=Host(`rybbit.${DOMAIN}`)"
      - "traefik.http.middlewares.rybbit-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.rybbit.middlewares=rybbit-https-redirect"
      - "traefik.http.routers.rybbit-secure.entrypoints=https"
      - "traefik.http.routers.rybbit-secure.rule=Host(`rybbit.${DOMAIN}`)"
      - "traefik.http.routers.rybbit-secure.tls=true"
      - "traefik.http.routers.rybbit-secure.service=rybbit"
      - "traefik.http.services.rybbit.loadbalancer.server.port=3002"  # port of the service.
      - "traefik.docker.network=intranet"
      - "homepage.group=Other"
      - "homepage.name=rybbit"
      - "homepage.icon=/images/rybbit.png"
      - "homepage.href=https://rybbit.${DOMAIN}/"

networks:
  intranet:
    external: true

configs:
  clickhouse_network:
    content: |
      <clickhouse>
          <listen_host>0.0.0.0</listen_host>
      </clickhouse>

  clickhouse_json:
    content: |
      <clickhouse>
          <settings>
              <enable_json_type>1</enable_json_type>
          </settings>
      </clickhouse>

  clickhouse_logging:
    content: |
      <clickhouse>
        <logger>
            <level>warning</level>
            <console>true</console>
        </logger>
        <query_thread_log remove="remove"/>
        <query_log remove="remove"/>
        <text_log remove="remove"/>
        <trace_log remove="remove"/>
        <metric_log remove="remove"/>
        <asynchronous_metric_log remove="remove"/>
        <session_log remove="remove"/>
        <part_log remove="remove"/>
        <latency_log remove="remove"/>
        <processors_profile_log remove="remove"/>
      </clickhouse>

  clickhouse_user_logging:
    content: |
      <clickhouse>
        <profiles>
          <default>
            <log_queries>0</log_queries>
            <log_query_threads>0</log_query_threads>
            <log_processors_profiles>0</log_processors_profiles>
          </default>
        </profiles>
      </clickhouse>
