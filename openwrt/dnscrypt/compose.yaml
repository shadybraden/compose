---
services:
  dnscrypt-proxy:
    image: klutchell/dnscrypt-proxy:2.1.15
    container_name: dnscrypt
    network_mode: host
    restart: no
    volumes:
      - /opt/config_storage/dnscrypt/logs:/logs
      - /opt/config_storage/dnscrypt/config:/config
      - ./dnscrypt-proxy.toml:/config/dnscrypt-proxy.toml:ro
    ports:
      - '5053:5053/udp'
      - '5053:5053/tcp'
