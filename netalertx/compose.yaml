services:
  netalertx:
    container_name: netalertx
    image: ghcr.io/netalertx/netalertx:26.5.4
    network_mode: host
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    volumes:
      - /data/config_storage/netalertx:/data:rw
      - /etc/localtime:/etc/localtime:ro
    tmpfs:
      - "/tmp:uid=${NETALERTX_UID:-20211},gid=${NETALERTX_GID:-20211},mode=1700,rw,noexec,nosuid,nodev,async,noatime,nodiratime"
    environment:
      LISTEN_ADDR: 0.0.0.0
      PORT: 20211
      GRAPHQL_PORT: 20212
      PUID: 20211
      PGID: 20211
    mem_limit: 2048m
    mem_reservation: 1024m
    cpu_shares: 512
    pids_limit: 512
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true  # helps to increase security
    networks:
      - intranet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.netalertx.entrypoints=http"
      - "traefik.http.routers.netalertx.rule=Host(`netalertx.${DOMAIN}`)"
      - "traefik.http.middlewares.netalertx-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.netalertx.middlewares=netalertx-https-redirect"
      - "traefik.http.routers.netalertx-secure.entrypoints=https"
      - "traefik.http.routers.netalertx-secure.rule=Host(`netalertx.${DOMAIN}`)"
      - "traefik.http.routers.netalertx-secure.tls=true"
      - "traefik.http.routers.netalertx-secure.service=netalertx"
      - "traefik.http.services.netalertx.loadbalancer.server.port=20211"  # port of the service.
      - "traefik.docker.network=intranet"
      - "homepage.group=Other"
      - "homepage.name=netalertx"
      - "homepage.icon=/images/netalertx.png"
      - "homepage.href=https://netalertx.${DOMAIN}/"

networks:
  intranet:
    external: true
