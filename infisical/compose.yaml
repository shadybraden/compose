---
services:
  backend:
    container_name: infisical-backend
    user: 1000:1000
    restart: unless-stopped
    depends_on:
      infisical-db:
        condition: service_healthy
      redis:
        condition: service_started
    image: infisical/infisical:v0.161.8
    environment:
      - NODE_ENV=production
      - AUTH_SECRET=${AUTH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - REDIS_URL=redis://redis:6379
      - SITE_URL=https://infisical.${DOMAIN}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - DB_CONNECTION_URI=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@infisical-db:5432/${POSTGRES_DB}
    security_opt:
      - no-new-privileges:true  # helps to increase security
    networks:
      - intranet
      - infisical
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.infisical.entrypoints=http"
      - "traefik.http.routers.infisical.rule=Host(`infisical.${DOMAIN}`)"
      - "traefik.http.middlewares.infisical-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.infisical.middlewares=infisical-https-redirect"
      - "traefik.http.routers.infisical-secure.entrypoints=https"
      - "traefik.http.routers.infisical-secure.rule=Host(`infisical.${DOMAIN}`)"
      - "traefik.http.routers.infisical-secure.tls=true"
      - "traefik.http.routers.infisical-secure.service=infisical"
      - "traefik.http.services.infisical.loadbalancer.server.port=8080"  # port of the service.
      - "traefik.docker.network=intranet"
      - "homepage.group=Other"
      - "homepage.name=infisical"
      - "homepage.icon=/images/infisical.png"
      - "homepage.href=https://infisical.${DOMAIN}/"
      #- "traefik.http.routers.infisical-secure.middlewares=tinyauth"

  redis:
    image: redis:8.8.0  # use latest
    container_name: infisical-dev-redis
    user: 1000:1000
    restart: unless-stopped
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
      - NODE_ENV=production
      - AUTH_SECRET=${AUTH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - REDIS_URL=redis://redis:6379
      - SITE_URL=https://infisical.${DOMAIN}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - DB_CONNECTION_URI=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    security_opt:
      - no-new-privileges:true  # helps to increase security
    networks:
      - intranet
      - infisical
    volumes:
      - /data/config_storage/infisical/redis_data:/data

  infisical-db:
    container_name: infisical-db
    user: 1000:1000
    image: postgres:14.23-alpine3.24  # pinned to 14-alpine - https://raw.githubusercontent.com/Infisical/infisical/main/docker-compose.prod.yml
    restart: unless-stopped
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - NODE_ENV=production
      - AUTH_SECRET=${AUTH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - REDIS_URL=redis://redis:6379
      - SITE_URL=https://infisical.${DOMAIN}
    volumes:
      - /data/config_storage/infisical/pg_data:/var/lib/postgresql/data
    security_opt:
      - no-new-privileges:true  # helps to increase security
    networks:
      - intranet
      - infisical
    healthcheck:
      test: "pg_isready --username=${POSTGRES_USER} && psql --username=${POSTGRES_USER} --list"
      interval: 5s
      timeout: 10s
      retries: 10

networks:
  infisical:
  intranet:
    external: true