services:
  hugo-serve:
    image: nginx:1.29.7
    volumes:
      - /data/hugo-public:/usr/share/nginx/html:ro
      #- /data/config_storage/komodo/etc_komodo/repos/compose_main/hugo-runner/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8089:8080"
    restart: no
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - intranet
    command: hugo server --bind 0.0.0.0 --destination /output
    init: true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hugo.entrypoints=http"
      - "traefik.http.routers.hugo.rule=Host(`hugo.${DOMAIN}`)"
      - "traefik.http.middlewares.hugo-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.hugo.middlewares=hugo-https-redirect"
      - "traefik.http.routers.hugo-secure.entrypoints=https"
      - "traefik.http.routers.hugo-secure.rule=Host(`hugo.${DOMAIN}`)"
      - "traefik.http.routers.hugo-secure.tls=true"
      - "traefik.http.routers.hugo-secure.service=hugo"
      - "traefik.http.services.hugo.loadbalancer.server.port=8080"  # port of the service.
      - "traefik.docker.network=intranet"
      - "homepage.group=Other"
      - "homepage.name=hugo"
      - "homepage.icon=/images/hugo.png"
      - "homepage.href=https://hugo.${DOMAIN}/"

networks:
  intranet:
    external: true
