---
services:
  nginx:
    image: nginx:1.31.0
    container_name: hugo-server
    volumes:
      - /data/hugo-public:/usr/share/nginx/html:ro
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - '/tmp:size=64m,uid=101,gid=101,mode=1777'
      - '/var/cache/nginx:size=64m,uid=101,gid=101,mode=0755'
      - '/var/run:size=8m,uid=101,gid=101,mode=0755'
    read_only: true
    user: "101:101"
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    init: true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64M
        reservations:
          memory: 16M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - intranet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hugo.entrypoints=http"
      - "traefik.http.routers.hugo.rule=Host(`hugo.${DOMAIN}`)"
      - "traefik.http.middlewares.hugo-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.hugo.middlewares=hugo-https-redirect"
      - "traefik.http.routers.hugo-secure.entrypoints=https"
      - "traefik.http.routers.hugo-secure.rule=Host(`hugo.${DOMAIN}`)"
      - "traefik.http.routers.hugo-secure.tls=true"
      - "traefik.http.routers.hugo-secure.service=hugo"
      - "traefik.http.services.hugo.loadbalancer.server.port=80"  # port of the service.
      - "traefik.docker.network=intranet"
      - "homepage.group=Other"
      - "homepage.name=hugo"
      - "homepage.icon=/images/hugo.png"
      - "homepage.href=https://hugo.${DOMAIN}/"

networks:
  intranet:
    external: true
