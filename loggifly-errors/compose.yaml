---
services:
  loggifly-errors:
    image: ghcr.io/clemcer/loggifly:v2.0.0
    container_name: loggifly-errors
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:  # https://clemcer.github.io/loggifly/guide/environment-variables.html
      NTFY_URL: "https://ntfy.holmlab.org"  # not a variable because logs should all go back to holmlab
      NTFY_TOPIC: ${topic}
      TITLE_TEMPLATE: "{{ container_name }}, {{ keyword }}"
      SYSTEM_NOTIFICATIONS_START: true
      SYSTEM_NOTIFICATIONS_SHUTDOWN: false
      TRIGGER_COOLDOWN: 5
      CONTAINERS: "*"
      CONTAINERS_NEVER_MONITOR: "loggifly-errors,loggifly,searxng,autobrr,aircraft,mautrix-discord,stirlingpdf,qui,pinchflat-holmie-pinchflat-1,skywatch,chrome,homepage,renovate,freshrss,sonarr,radarr,synapse"
      # CONTAINERS: "olivetin,ntfy,factorio,vaultwarden,actual_server,anubis,wedding-share,audiobookshelf,pihole,wg-easy,forgejo,jellyfin,immich_server,nextcloud,silverbullet,tinyauth"
      GLOBAL_KEYWORDS: "Database: jdbc:mariadb://mariadb_grimmory/grimmory?user=grimmory&password=********,Logging to '/config/log/mysql/mariadb-error.log,ExitOnOutOfMemoryError,HeapDumpOnOutOfMemoryError,[JOIN],[LEAVE],error"
      IGNORE_KEYWORDS: "Registering daily callback: purge_password_reset_tokens,bf-error-rate,due to plan restriction. Upgrade plan to,Error: connect ECONNREFUSED 127.0.0.1:587,Only admins can view external migration configs,Artwork not found,[INFO ] Using admin password from FILEBROWSER_ADMIN_PASSWORD environment variable,[INFO ] Auth Methods             : [password],[INFO ] Resetting admin user to default username and password.,ERROR:searx.engines: Missing engine config attribute:,wikicommons,Engine setup was not successful,failed: set engine to inactive!,IndexError: list index out of range,error locationg sandbox,mkdir '/tmp/n8nDataTableUploads,wikidata,So expect some minor errors here and there,expected image index descriptor, got application/vnd.oci.image.manifest.v1+json,[debug] | QUERY OK source=,MediaBrowser.Providers.MediaInfo.SubtitleResolver: Error getting external streams from,Failed to find media using external IMDb ID: No movie or show returned from API for ID,failed to accept QUIC stream: Application error 0x0 (remote),failed to dial to edge with quic: timeout: no recent network activity,no scratch file generator: skip plugin,Task exception was never retrieved (task: None),find coverArt,missing required config `base_url`,Error in Probe Provider,Cannot read properties of null,Unable to find TMDb ID,failed to accept QUIC stream: timeout: no recent network activity,Criticality=false,context canceled,control stream encountered a failure while serving,https://frigate.holmlab.org/api/stats: Bad Gateway,Unable to connect to MQTT server,WARNING:searx.engines,FlareSolverr is not configured,occured while fetching,Temporary failure in name resolution,INFO Settings summary,Wireguard setup is complete,searx.engines: loading engine ahmia failed: set engine to inactive!,failed to get app preferences: could not unmarshal body,restarting VPN,Something went wrong caching image,engine timeout,INF Connection closed,<minecraftProxyHandler> Error: connect ECONNREFUSED,was sent SIGINT,LOG [Api:ServerService] Feature Flags: {,searx.engines: Cannot load engine,raise SearxEngineCaptchaException,INF Failed to join session,WRN Failed to exchange Hello messages,--ignore-no-formats-error,ERROR: Not a valid UUID,purging password reset tokens,failed to prune images on server shady,INF Lost device connection,There are 0 errors and 0 warnings,BeastReduce TCP output,WRN Failed TLS handshake,DNS server returned general failure,WRN Failed to acquire open port,Unable to parse,duplicate key value violates unique constraint,websocket send error: websocket: close sent,Connection error (9.9.9.9#53):,The remote party closed the WebSocket connection,Error in TheMovieDb,automerge queue already in queue,Token has expired,Unable to download icon,Input file contains unsupported image format"
      #GLOBAL_KEYWORDS_WITH_ATTACHMENT: "critical"  # Attaches a log file to the notification
      NTFY_PRIORITY: 1
    restart: unless-stopped
