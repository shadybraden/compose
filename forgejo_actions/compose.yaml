---
services:
  docker-in-docker:
    image: docker:29.4.0-dind
    container_name: 'docker_dind'
    privileged: 'true'
    command: ['dockerd', '-H', 'tcp://0.0.0.0:2375', '--tls=false']
    restart: 'unless-stopped'

  runner:
    image: 'data.forgejo.org/forgejo/runner:12.9.0'
    links:
      - docker-in-docker
    depends_on:
      docker-in-docker:
        condition: service_started
    container_name: 'runner'
    environment:
      DOCKER_HOST: tcp://docker-in-docker:2375
    user: 1001:1001
    volumes:
      - /data/config_storage/forgejo-action/data:/data  # mkdir -p data/.cache && chown -R 1001:1001 data && chmod 775 data/.cache && chmod g+s data/.cache
    restart: 'unless-stopped'
    command: 'forgejo-runner daemon --config runner-config.yml'  # for normal use; post registration
