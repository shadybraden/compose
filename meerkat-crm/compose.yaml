---
services:
  backend:
    image: ghcr.io/fbuchner/meerkat-crm-backend:1.2.0
    container_name: meerkat-backend
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    volumes:
      - /data/config_storage/meerkat/data:/app/data
      - /data/config_storage/meerkat/photos:/app/static/photos
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true  # helps to increase security
    networks:
      - intranet

  frontend:
    image: ghcr.io/fbuchner/meerkat-crm-frontend:1.2.1
    container_name: meerkat-frontend
    restart: unless-stopped
    environment:
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      backend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true  # helps to increase security
    networks:
      - intranet
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.meerkat.entrypoints=http"
      - "traefik.http.routers.meerkat.rule=Host(`meerkat.${DOMAIN}`)"
      - "traefik.http.middlewares.meerkat-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.meerkat.middlewares=meerkat-https-redirect"
      - "traefik.http.routers.meerkat-secure.entrypoints=https"
      - "traefik.http.routers.meerkat-secure.rule=Host(`meerkat.${DOMAIN}`)"
      - "traefik.http.routers.meerkat-secure.tls=true"
      - "traefik.http.routers.meerkat-secure.service=meerkat"
      - "traefik.http.services.meerkat.loadbalancer.server.port=8080"  # port of the service.
      - "traefik.docker.network=intranet"
      - "homepage.group=Other"
      - "homepage.name=meerkat"
      - "homepage.icon=/images/meerkat.png"
      - "homepage.href=https://meerkat.${DOMAIN}/"

networks:
  intranet:
    external: true
