services:
  hugo-build:
    image: hugomods/hugo:0.160.0
    volumes:
      - /data/config_storage/komodo/etc_komodo/repos/shadybradencom:/src:rw
      - /data/hugo-public:/output
    working_dir: /src
    command: sh -c "rm -r /output/* && sleep 60000 && hugo build --destination /output --minify --baseURL="https://hugo.${DOMAIN}/" && chown -R 1000:1000 /output"
    environment:
      - HUGO_ENVIRONMENT=production
      - HUGO_ENV=production
